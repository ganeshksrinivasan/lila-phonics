<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spelling Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 1.5rem 1rem;
}
.card {
  background: white; border-radius: 24px;
  padding: 2rem 1.75rem; width: 100%; max-width: 480px;
  box-shadow: 0 8px 40px rgba(80,80,160,0.10);
}
.back-link { background: none; border: none; font-family: inherit; font-size: 13px; color: #aaaacc; cursor: pointer; padding: 0; margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 4px; }
.back-link:hover { color: #7c7cf8; }
.green-btn { background: linear-gradient(135deg,#34c88a,#20b070); color: white; border: none; border-radius: 14px; padding: 13px 36px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; transition: opacity 0.2s; }
.green-btn:hover { opacity: 0.9; }
.text-link { background: none; border: none; font-size: 13px; color: #aaaacc; cursor: pointer; font-family: inherit; text-decoration: underline; margin-top: 1rem; display: inline-block; }
.text-link:hover { color: #7c7cf8; }

/* Loading */
.loading { text-align: center; padding: 3rem 1rem; }
.loading-spinner { width: 40px; height: 40px; border: 4px solid #eef0ff; border-top-color: #7c7cf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 14px; color: #aaaacc; }
.error-box { background: #fff0f0; border: 1.5px solid #ffcccc; border-radius: 14px; padding: 1rem; font-size: 14px; color: #cc3333; margin-top: 1rem; text-align: center; }
.retry-btn { background: #fff0f0; border: 1.5px solid #ffcccc; border-radius: 10px; padding: 7px 16px; font-size: 13px; font-weight: 700; color: #cc3333; cursor: pointer; font-family: inherit; margin-top: 0.75rem; }

/* Catalog */
.catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.catalog-title { font-size: 22px; font-weight: 800; color: #2d2d5e; }
.sync-btn { background: #eef0ff; border: 1.5px solid #c8caff; border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 700; color: #7c7cf8; cursor: pointer; font-family: inherit; }
.sync-btn:hover { background: #e0e3ff; }
.session-card { border: 2px solid #eef0ff; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.session-card:hover { border-color: #c8caff; background: #fafaff; }
.session-card h3 { font-size: 15px; font-weight: 800; color: #2d2d5e; margin-bottom: 0.2rem; }
.session-card p { font-size: 12px; color: #aaaacc; margin-bottom: 0.4rem; }
.pattern-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.pattern-dot { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
.empty-state { text-align: center; padding: 2.5rem 1rem; color: #aaaacc; }
.empty-state div { font-size: 48px; margin-bottom: 0.75rem; }

/* Intro */
.intro-wrap { text-align: center; }
.intro-title { font-size: 22px; font-weight: 800; color: #2d2d5e; margin-bottom: 0.25rem; }
.intro-sub { font-size: 13px; color: #aaaacc; margin-bottom: 1.25rem; }
.pattern-group { border-radius: 14px; padding: 0.5rem 1rem; margin-bottom: 0.5rem; text-align: left; }
.pattern-words { display: flex; flex-direction: column; gap: 4px; }
.pattern-word { font-size: 15px; font-weight: 700; color: #2d2d5e; }
.chunk-highlight { border-radius: 6px; padding: 0 3px; }

/* Game */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.stars { font-size: 18px; color: #f5b100; letter-spacing: 3px; min-width: 60px; }
.prog { font-size: 13px; font-weight: 700; color: #aaaacc; }
.word-reveal { font-size: 26px; font-weight: 800; letter-spacing: 4px; color: #2d2d5e; min-height: 46px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.4rem; text-transform: uppercase; transition: opacity 0.5s; flex-wrap: wrap; }
.word-reveal.hidden { opacity: 0; pointer-events: none; }
.timer-wrap { height: 5px; background: #eef0ff; border-radius: 5px; margin-bottom: 0.3rem; overflow: hidden; }
.timer-bar { height: 5px; border-radius: 5px; }
.timer-secs { font-size: 10px; color: #ccccdd; text-align: right; margin-bottom: 0.55rem; font-family: 'Nunito', sans-serif; font-weight: 600; letter-spacing: 0.5px; }
.sub-lbl { font-size: 13px; color: #aaaacc; font-weight: 600; margin-bottom: 0.9rem; text-align: center; }
.hear-btn { display: block; margin: 0 auto 0.3rem; background: #f0f4ff; border: 1.5px solid #dde0f5; border-radius: 50px; padding: 7px 20px; font-size: 13px; font-weight: 700; color: #7c7cf8; cursor: pointer; font-family: 'Nunito', sans-serif; }
.hear-btn:hover { background: #e4e8ff; }
.kbd-hint { font-size: 11px; color: #ccccdd; text-align: center; margin-bottom: 1.1rem; }
.boxes { display: flex; gap: 7px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
.box { min-width: 44px; height: 52px; border-radius: 11px; border: 2.5px solid #dde0f5; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; text-transform: uppercase; transition: all 0.2s; color: #2d2d5e; background: white; padding: 0 6px; }
.box.active { border-color: #7c7cf8; background: #f0f0ff; color: #5050cc; }
.box.done { border-color: #34c88a; background: #e8faf2; color: #1a8a5a; }
.box.wrong { animation: shake 0.35s; border-color: #ff6b6b; background: #fff0f0; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.1rem; }
.tile { min-width: 50px; height: 54px; border-radius: 13px; border: 2px solid #dde0f5; background: white; font-size: 22px; font-weight: 800; cursor: pointer; text-transform: uppercase; color: #2d2d5e; font-family: 'Nunito', sans-serif; display: flex; align-items: center; justify-content: center; padding: 0 8px; transition: background 0.12s, transform 0.1s, opacity 0.18s; }
.tile:hover { background: #f0f0ff; border-color: #a0a0f8; }
.tile:active { transform: scale(0.91); }
.tile.used { opacity: 0; pointer-events: none; transform: scale(0.65); }
.tile.flash-wrong { background: #fff0f0; border-color: #ff6b6b; color: #cc3333; animation: shake 0.35s; }
.undo-btn { display: block; margin: 0 auto; background: none; border: 1.5px solid #dde0f5; border-radius: 10px; padding: 6px 16px; font-size: 13px; font-weight: 700; color: #aaaacc; cursor: pointer; font-family: 'Nunito', sans-serif; }
.undo-btn:hover { background: #f8f8ff; color: #7c7cf8; border-color: #c0c0f8; }

/* Celebrate */
.celebrate { text-align: center; padding: 1rem 0; }
.cel-icon { font-size: 64px; margin-bottom: 0.75rem; }
.cel-word { font-size: 24px; font-weight: 800; color: #34c88a; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 3px; }
.cel-msg { font-size: 20px; font-weight: 800; color: #2d2d5e; margin-bottom: 0.3rem; }
.cel-stars { font-size: 20px; color: #f5b100; margin-bottom: 1.5rem; }

/* Done */
.done-wrap { text-align: center; padding: 1rem 0; }
.done-wrap h2 { font-size: 22px; font-weight: 800; color: #2d2d5e; margin: 1rem 0 0.5rem; }
.done-wrap p { font-size: 15px; color: #8888aa; margin-bottom: 0.25rem; }
.done-stars { font-size: 26px; color: #f5b100; margin: 0.75rem 0 1.5rem; }

/* Word Search */
.ws-wrap { text-align: center; }
.ws-title { font-size: 20px; font-weight: 800; color: #2d2d5e; margin-bottom: 0.25rem; }
.ws-sub { font-size: 13px; color: #aaaacc; margin-bottom: 1.25rem; }
.ws-grid-wrap { display: inline-block; margin-bottom: 1.25rem; touch-action: none; user-select: none; -webkit-user-select: none; }
.ws-grid { display: grid; gap: 3px; }
.ws-cell {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; text-transform: uppercase;
  background: #f4f5ff; color: #2d2d5e;
  transition: background 0.15s, color 0.15s;
  cursor: pointer; border: 2px solid transparent;
}
.ws-cell.selecting { background: #e0e3ff; color: #5050cc; border-color: #a0a0f8; }
.ws-cell.found { color: white; }
.ws-word-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
.ws-word {
  font-size: 14px; font-weight: 700; padding: 5px 12px;
  border-radius: 20px; background: #f4f5ff; color: #2d2d5e;
  transition: all 0.3s;
}
.ws-word.found { text-decoration: line-through; opacity: 0.5; }
.ws-done { padding: 1.5rem 0; }
.ws-done div { font-size: 64px; margin-bottom: 0.75rem; }
.ws-done h2 { font-size: 22px; font-weight: 800; color: #2d2d5e; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const CATALOG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYFZN1cEJxiI0Rg-nskWeM4ELfF7BRyGNbNmeDA1D7YQX7WVBVd9uvjKTBhpoY7XQkPKHmFZxEzNzF/pub?output=csv';
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbzdnOH5g90NY6Lrk1e-QUuhCinxluIEIk24VfC0ZNjdX7pe-Q5KRAWSBwYcbPh403_MrA/exec';

const PALETTE = [
  { bg:'#fff3e0', text:'#b85c00', bar:'#f5a623' },
  { bg:'#e8f5e9', text:'#1b5e20', bar:'#34c88a' },
  { bg:'#e8eaf6', text:'#283593', bar:'#7c7cf8' },
  { bg:'#fce4ec', text:'#880e4f', bar:'#e91e8c' },
  { bg:'#e0f7fa', text:'#006064', bar:'#00bcd4' },
  { bg:'#f3e5f5', text:'#4a148c', bar:'#ab47bc' },
];
const MSGS = ['Amazing!','Superstar!','Brilliant!','You got it!','Wow!','Perfect!','Well done!'];
const CONFUSABLE = { 'B':'D','D':'B','M':'N','N':'M','P':'Q','Q':'P','U':'V','V':'U','I':'L','L':'I' };
const ALL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

let catalog = [];
let G = {};
let revealTimer = null;

function parseWord(entry) {
  const raw = typeof entry === 'object' ? entry.word : entry;
  const flashTime = typeof entry === 'object' ? entry.flashTime : null;
  const m = raw.trim().match(/^([a-zA-Z]*)\[([a-zA-Z]+)\]([a-zA-Z]*)$/);
  if (!m) return null;
  return { raw:(m[1]+m[2]+m[3]).toLowerCase(), chunk:m[2].toLowerCase(), before:m[1].toLowerCase(), after:m[3].toLowerCase(), flashTime };
}
function getPatterns(words) {
  const seen=[],r=[];
  words.forEach(w=>{ if(w&&!seen.includes(w.chunk)){seen.push(w.chunk);r.push(w.chunk);} });
  return r;
}
function patternColor(chunk,patterns){ return PALETTE[patterns.indexOf(chunk)%PALETTE.length]; }
function renderHighlighted(wordObj,patterns){
  const col = patternColor(wordObj.chunk,patterns);
  return `${wordObj.before.toUpperCase()}<span class="chunk-highlight" style="background:${col.bg};color:${col.text}">${wordObj.chunk.toUpperCase()}</span>${wordObj.after.toUpperCase()}`;
}

async function fetchCatalog(){
  const resp = await fetch(CATALOG_URL+'&t='+Date.now());
  const text = await resp.text();
  const lines = text.trim().split('\n').slice(1);
  const map = {};
  lines.forEach(line => {
    const cols = line.split(',');
    const session   = cols[0]?.trim().replace(/^"|"$/g,'');
    const word      = cols[1]?.trim().replace(/^"|"$/g,'');
    const flashTime = cols[2]?.trim().replace(/^"|"$/g,'');
    if(!session||!word) return;
    if(!map[session]) map[session]=[];
    map[session].push({ word, flashTime: flashTime ? parseFloat(flashTime) : null });
  });
  return Object.entries(map).map(([title,entries])=>({title,entries}));
}

async function postProgress(data){
  try{ await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }catch(e){}
}

// ── CATALOG ──
async function showCatalog(){
  clearTimeout(revealTimer);
  document.getElementById('app').innerHTML=`<div class="loading"><div class="loading-spinner"></div><p>Loading sessions...</p></div>`;
  try{
    catalog = await fetchCatalog();
    localStorage.setItem('spelling_catalog_cache',JSON.stringify(catalog));
  }catch(e){
    const cached = localStorage.getItem('spelling_catalog_cache');
    if(cached){ catalog=JSON.parse(cached); }
    else{
      document.getElementById('app').innerHTML=`
        <div class="catalog-header"><div class="catalog-title">📖 Spelling Game</div></div>
        <div class="error-box">Could not load sessions.<br><button class="retry-btn" onclick="showCatalog()">retry</button></div>`;
      return;
    }
  }
  const cards = catalog.length===0
    ? `<div class="empty-state"><div>📚</div><p>No sessions in your Google Sheet yet.</p></div>`
    : catalog.map((s,i)=>{
        const words = s.entries.map(parseWord).filter(Boolean);
        const patterns = getPatterns(words);
        const dots = patterns.map(p=>{
          const col = patternColor(p,patterns);
          return `<span class="pattern-dot" style="background:${col.bg};color:${col.text}">${p}</span>`;
        }).join('');
        return `<div class="session-card" onclick="showIntro(${i})">
          <h3>${s.title}</h3>
          <p>${words.length} word${words.length!==1?'s':''}</p>
          <div class="pattern-dots">${dots}</div>
        </div>`;
      }).join('');
  document.getElementById('app').innerHTML=`
    <div class="catalog-header">
      <div class="catalog-title">📖 Spelling Game</div>
      <button class="sync-btn" onclick="showCatalog()">↻ sync</button>
    </div>${cards}`;
}

// ── INTRO ──
function showIntro(idx){
  clearTimeout(revealTimer);
  const s = catalog[idx];
  const words = s.entries.map(parseWord).filter(Boolean);
  const patterns = getPatterns(words);
  const groups = patterns.map(p=>{
    const col = patternColor(p,patterns);
    const pw = words.filter(w=>w.chunk===p);
    return `<div class="pattern-group" style="background:${col.bg}">
      <div class="pattern-words">${pw.map(w=>`<span class="pattern-word">${renderHighlighted(w,patterns)}</span>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('app').innerHTML=`
    <button class="back-link" onclick="showCatalog()">← back</button>
    <div class="intro-wrap">
      <div class="intro-title">${s.title}</div>
      <div class="intro-sub">Look at the patterns together, then start!</div>
      ${groups}
      <button class="green-btn" style="width:100%;margin-top:0.75rem" onclick="startGame(${idx})">start →</button>
    </div>`;
}

// ── GAME ──
function startGame(idx){
  const s = catalog[idx];
  const words = s.entries.map(parseWord).filter(Boolean).sort(()=>Math.random()-0.5);
  const patterns = getPatterns(words);
  G = { words, patterns, idx:0, stars:0, pos:0, mistakes:0, pool:[], sessionIdx:idx, sessionTitle:s.title };
  startWord();
}

function startWord(){
  G.pos=0; G.mistakes=0;
  G.pool = buildPool(G.words[G.idx].raw);
  renderGame();
  setTimeout(()=>say(G.words[G.idx].raw), 400);
}

function say(w){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.rate=0.75; u.pitch=1.1;
  speechSynthesis.speak(u);
}

function buildPool(word){
  const needed = word.toUpperCase().split('');
  const confusableWith = new Set(needed.flatMap(l=>[l, CONFUSABLE[l]].filter(Boolean)));
  const candidates = ALL.filter(c=>!confusableWith.has(c));
  const extras = candidates.sort(()=>Math.random()-0.5).slice(0,3);
  return [...needed,...extras].sort(()=>Math.random()-0.5).map((l,i)=>({id:i,letter:l,used:false}));
}

function renderGame(){
  const {words,patterns,idx,stars,pos,pool} = G;
  if(idx>=words.length){ renderAllDone(); return; }
  const wordObj = words[idx];
  const word = wordObj.raw;
  const col = patternColor(wordObj.chunk,patterns);
  const showing = pos===0;

  const boxes = word.split('').map((l,i)=>{
    const cls = i<pos?'done':i===pos?'active':'';
    return `<div class="box ${cls}" id="b${i}">${i<pos?l.toUpperCase():''}</div>`;
  }).join('');

  const tiles = pool.map(t=>
    `<button class="tile${t.used?' used':''}" id="tile-${t.id}" onclick="pickTile(${t.id})">${t.letter}</button>`
  ).join('');

  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div class="stars">${'★'.repeat(stars)}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="back-link" style="margin:0" onclick="showIntro(${G.sessionIdx})">↩</button>
        <div class="prog">${idx+1} / ${words.length}</div>
      </div>
    </div>
    <div class="word-reveal${showing?'':' hidden'}" id="ws">${renderHighlighted(wordObj,patterns)}</div>
    <div class="timer-wrap" id="tw" style="${showing?'':'display:none'}"><div class="timer-bar" id="tb" style="width:100%;background:${col.bar}"></div></div>
    <div class="timer-secs" id="ts" style="${showing?'':'display:none'}"></div>
    <div class="sub-lbl" id="sl">${showing?'remember it...':'spell it out'}</div>
    <button class="hear-btn" onclick="say('${word}')">🔊 hear it</button>
    <div class="kbd-hint">tap a tile or type on keyboard</div>
    <div class="boxes">${boxes}</div>
    <div class="pool">${tiles}</div>
    ${pos>0?`<button class="undo-btn" onclick="undoLast()">← undo</button>`:''}
  `;
  if(showing) startRevealTimer(col.bar, wordObj.flashTime);
}

function startRevealTimer(barColor, flashSecs){
  clearTimeout(revealTimer);
  const dur = flashSecs ? flashSecs*1000 : 500, start=Date.now();
  const tick=()=>{
    const el=document.getElementById('tb'); if(!el)return;
    const elapsed=Date.now()-start;
    const pct=Math.max(0,100-elapsed/dur*100);
    el.style.width=pct+'%';
    const ts=document.getElementById('ts');
    if(ts){ const rem=Math.max(0,(dur-elapsed)/1000); ts.textContent=rem.toFixed(1)+'s'; }
    if(pct>0) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
  revealTimer=setTimeout(()=>{
    const ws=document.getElementById('ws'),tw=document.getElementById('tw'),sl=document.getElementById('sl'),ts=document.getElementById('ts');
    if(ws)ws.classList.add('hidden');
    if(tw)tw.style.display='none';
    if(ts){ ts.textContent=(dur/1000).toFixed(1)+'s flash'; }
    if(sl)sl.textContent='spell it out';
  },dur);
}

function pickTile(id){
  const tile=G.pool.find(t=>t.id===id);
  if(!tile||tile.used)return;
  const word=G.words[G.idx].raw.toUpperCase();
  const correct=word[G.pos];
  if(tile.letter===correct){
    tile.used=true;
    const tEl=document.getElementById('tile-'+id);
    if(tEl)tEl.classList.add('used');
    const box=document.getElementById('b'+G.pos);
    if(box){box.classList.remove('active');box.classList.add('done');box.textContent=tile.letter;}
    G.pos++;
    const nb=document.getElementById('b'+G.pos);
    if(nb)nb.classList.add('active');
    const sl=document.getElementById('sl');
    if(sl)sl.textContent='spell it out';
    if(!document.querySelector('.undo-btn')){
      const pe=document.querySelector('.pool');
      if(pe){const b=document.createElement('button');b.className='undo-btn';b.innerHTML='← undo';b.onclick=undoLast;pe.insertAdjacentElement('afterend',b);}
    }
    if(G.pos===word.length){
      clearTimeout(revealTimer);
      const earned=G.mistakes===0?2:1;
      G.stars+=earned;
      postProgress({timestamp:new Date().toISOString(),session:G.sessionTitle,word:G.words[G.idx].raw,mistakes:G.mistakes});
      setTimeout(()=>renderCelebrate(G.words[G.idx],earned),350);
    }
  }else{
    G.mistakes++;
    const tEl=document.getElementById('tile-'+id);
    if(tEl){tEl.classList.add('flash-wrong');setTimeout(()=>tEl.classList.remove('flash-wrong'),420);}
    const box=document.getElementById('b'+G.pos);
    if(box){box.classList.add('wrong');setTimeout(()=>box.classList.remove('wrong'),420);}
  }
}

function undoLast(){
  if(G.pos===0)return;
  const letter=G.words[G.idx].raw.toUpperCase()[--G.pos];
  const tile=G.pool.slice().reverse().find(t=>t.used&&t.letter===letter);
  if(tile){tile.used=false;const tEl=document.getElementById('tile-'+tile.id);if(tEl)tEl.classList.remove('used');}
  const box=document.getElementById('b'+G.pos);
  if(box){box.classList.remove('done');box.classList.add('active');box.textContent='';}
  const nb=document.getElementById('b'+(G.pos+1));
  if(nb)nb.classList.remove('active');
}

document.addEventListener('keydown',e=>{
  if(!G.words||G.idx>=G.words.length)return;
  if(e.key==='Backspace'){undoLast();return;}
  const letter=e.key.toUpperCase();
  if(!/^[A-Z]$/.test(letter))return;
  const tile=G.pool.find(t=>!t.used&&t.letter===letter);
  if(tile){pickTile(tile.id);}
  else{
    G.mistakes++;
    const box=document.getElementById('b'+G.pos);
    if(box){box.classList.add('wrong');setTimeout(()=>box.classList.remove('wrong'),420);}
  }
});

function renderCelebrate(wordObj,earned){
  const msg=MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById('app').innerHTML=`
    <div class="celebrate">
      <div class="cel-icon">🎉</div>
      <div class="cel-word">${renderHighlighted(wordObj,G.patterns)}</div>
      <div class="cel-msg">${msg}</div>
      <div class="cel-stars">${'★'.repeat(earned)} ${earned===2?'no mistakes!':'keep going!'}</div>
      <button class="green-btn" onclick="nextWord()">next word →</button>
    </div>`;
  say(wordObj.raw);
}

function nextWord(){
  G.idx++;
  if(G.idx>=G.words.length){renderAllDone();return;}
  startWord();
}

function renderAllDone(){
  clearTimeout(revealTimer);
  document.getElementById('app').innerHTML=`
    <div class="done-wrap">
      <div style="font-size:64px">🌟</div>
      <h2>All done!</h2>
      <p>You earned <strong>${G.stars}</strong> stars today!</p>
      <div class="done-stars">${'★'.repeat(G.stars)}</div>
      <button class="green-btn" onclick="startWordSearch()">word search →</button>
      <br><button class="text-link" onclick="showCatalog()">back to sessions</button>
    </div>`;
}

// ══════════════════════════════════════
// WORD SEARCH
// ══════════════════════════════════════
let WS = {};

function startWordSearch(){
  const words = G.words.map(w=>w.raw.toUpperCase());
  const patterns = G.patterns;
  const longestWord = words.reduce((a,w)=>Math.max(a,w.length),0);
  const size = Math.min(10, Math.max(longestWord + 2, Math.ceil(Math.sqrt(words.join('').length * 2))));
  const {grid, placed} = buildGrid(words, size);
  WS = { grid, placed, size, words, patterns, foundWords:new Set(), selecting:false, startCell:null, currentCells:[] };
  renderWordSearch();
}

function buildGrid(words, size){
  const grid = Array.from({length:size},()=>Array(size).fill(''));
  const placed = [];
  const dirs = [{dr:0,dc:1},{dr:1,dc:0}]; // left-to-right, top-to-bottom only

  for(const word of words){
    let tries=0, ok=false;
    while(tries++<200&&!ok){
      const dir = dirs[Math.floor(Math.random()*dirs.length)];
      const maxR = dir.dr===0 ? size : size-word.length;
      const maxC = dir.dc===0 ? size : size-word.length;
      const r = Math.floor(Math.random()*maxR);
      const c = Math.floor(Math.random()*maxC);
      let fits=true;
      const cells=[];
      for(let i=0;i<word.length;i++){
        const nr=r+dir.dr*i, nc=c+dir.dc*i;
        if(grid[nr][nc]!==''&&grid[nr][nc]!==word[i]){fits=false;break;}
        cells.push({r:nr,c:nc});
      }
      if(fits){
        cells.forEach((cell,i)=>grid[cell.r][cell.c]=word[i]);
        placed.push({word,cells,found:false});
        ok=true;
      }
    }
  }
  // Fill empty with random letters
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(!grid[r][c]) grid[r][c]=alpha[Math.floor(Math.random()*26)];
  return {grid,placed};
}

function renderWordSearch(){
  const {grid,placed,size,words,patterns,foundWords} = WS;
  const cellSize = Math.min(44, Math.floor((Math.min(window.innerWidth,480)-60)/size));

  const cells = grid.map((row,r)=>
    row.map((letter,c)=>{
      const foundInfo = placed.find(p=>p.found&&p.cells.some(cell=>cell.r===r&&cell.c===c));
      const wordObj = foundInfo ? G.words.find(w=>w.raw.toUpperCase()===foundInfo.word) : null;
      const col = wordObj ? patternColor(wordObj.chunk,patterns) : null;
      const style = foundInfo ? `background:${col.bar};color:white;` : '';
      return `<div class="ws-cell" id="wc-${r}-${c}" data-r="${r}" data-c="${c}" style="width:${cellSize}px;height:${cellSize}px;font-size:${Math.floor(cellSize*0.42)}px;${style}">${letter}</div>`;
    }).join('')
  ).join('');

  const wordList = placed.map(p=>{
    const wordObj = G.words.find(w=>w.raw.toUpperCase()===p.word);
    const col = wordObj ? patternColor(wordObj.chunk,patterns) : null;
    const highlighted = wordObj ? renderHighlighted(wordObj,patterns) : p.word;
    return `<span class="ws-word${p.found?' found':''}" id="wsw-${p.word}">${highlighted}</span>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <div class="ws-wrap">
      <div class="ws-title">🔍 Word Search</div>
      <div class="ws-sub">Find all the words!</div>
      <div class="ws-grid-wrap">
        <div class="ws-grid" id="wsgrid" style="grid-template-columns:repeat(${size},${cellSize}px);gap:3px">${cells}</div>
      </div>
      <div class="ws-word-list">${wordList}</div>
    </div>`;

  setupWordSearchTouch();
}

function setupWordSearchTouch(){
  const grid = document.getElementById('wsgrid');
  if(!grid)return;

  function cellFromPoint(x,y){
    const els = document.elementsFromPoint(x,y);
    return els.find(e=>e.classList.contains('ws-cell'));
  }

  function getCellsInLine(start,end){
    const r1=parseInt(start.dataset.r),c1=parseInt(start.dataset.c);
    const r2=parseInt(end.dataset.r),c2=parseInt(end.dataset.c);
    const cells=[];
    // horizontal
    if(r1===r2){
      const step=c2>=c1?1:-1;
      for(let c=c1;c!==c2+step;c+=step) cells.push({r:r1,c});
    }
    // vertical
    else if(c1===c2){
      const step=r2>=r1?1:-1;
      for(let r=r1;r!==r2+step;r+=step) cells.push({r,c:c1});
    }
    return cells;
  }

  function highlightCells(cells){
    // Clear previous selecting
    document.querySelectorAll('.ws-cell.selecting').forEach(el=>el.classList.remove('selecting'));
    cells.forEach(({r,c})=>{
      const el=document.getElementById(`wc-${r}-${c}`);
      if(el&&!el.style.background) el.classList.add('selecting');
    });
  }

  function checkWord(cells){
    const letters=cells.map(({r,c})=>WS.grid[r][c]).join('');
    const match=WS.placed.find(p=>!p.found&&(p.word===letters||p.word===letters.split('').reverse().join('')));
    if(match){
      match.found=true;
      WS.foundWords.add(match.word);
      // Colour found cells
      const wordObj=G.words.find(w=>w.raw.toUpperCase()===match.word);
      const col=wordObj?patternColor(wordObj.chunk,WS.patterns):PALETTE[0];
      cells.forEach(({r,c})=>{
        const el=document.getElementById(`wc-${r}-${c}`);
        if(el){el.classList.remove('selecting');el.style.background=col.bar;el.style.color='white';}
      });
      const wordEl=document.getElementById(`wsw-${match.word}`);
      if(wordEl)wordEl.classList.add('found');
      if(WS.foundWords.size===WS.placed.length) setTimeout(renderWordSearchDone,600);
    } else {
      document.querySelectorAll('.ws-cell.selecting').forEach(el=>el.classList.remove('selecting'));
    }
  }

  // Touch
  grid.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const cell=cellFromPoint(t.clientX,t.clientY);
    if(!cell)return;
    WS.selecting=true; WS.startCell=cell; WS.currentCells=[{r:parseInt(cell.dataset.r),c:parseInt(cell.dataset.c)}];
    highlightCells(WS.currentCells);
  },{passive:false});

  grid.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!WS.selecting||!WS.startCell)return;
    const t=e.touches[0];
    const cell=cellFromPoint(t.clientX,t.clientY);
    if(!cell)return;
    WS.currentCells=getCellsInLine(WS.startCell,cell);
    highlightCells(WS.currentCells);
  },{passive:false});

  grid.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!WS.selecting)return;
    WS.selecting=false;
    checkWord(WS.currentCells);
    WS.currentCells=[];WS.startCell=null;
  },{passive:false});

  // Mouse (for desktop)
  grid.addEventListener('mousedown',e=>{
    const cell=e.target.closest('.ws-cell');
    if(!cell)return;
    WS.selecting=true;WS.startCell=cell;WS.currentCells=[{r:parseInt(cell.dataset.r),c:parseInt(cell.dataset.c)}];
    highlightCells(WS.currentCells);
  });
  grid.addEventListener('mousemove',e=>{
    if(!WS.selecting||!WS.startCell)return;
    const cell=e.target.closest('.ws-cell');
    if(!cell)return;
    WS.currentCells=getCellsInLine(WS.startCell,cell);
    highlightCells(WS.currentCells);
  });
  grid.addEventListener('mouseup',e=>{
    if(!WS.selecting)return;
    WS.selecting=false;
    checkWord(WS.currentCells);
    WS.currentCells=[];WS.startCell=null;
  });
}

function renderWordSearchDone(){
  const app=document.getElementById('app');
  if(!app)return;
  const existing=app.querySelector('.ws-wrap');
  if(existing){
    const doneDiv=document.createElement('div');
    doneDiv.className='ws-done';
    doneDiv.innerHTML=`<div>🎊</div><h2>You found them all!</h2>
      <button class="green-btn" onclick="showCatalog()">back to sessions</button>`;
    existing.appendChild(doneDiv);
  }
}

showCatalog();
</script>
